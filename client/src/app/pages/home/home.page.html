<main class="page">
  <section class="card">
    <header class="header">
      <h1>Trust Crawl</h1>
      <p>Set your name, connect, and see who else is online.</p>
    </header>

    <form class="connect-form" (ngSubmit)="inventory.connect()">
      <label class="field">
        <span>Your name</span>
        <input
          type="text"
          placeholder="Enter your name"
          [ngModel]="inventory.state.name"
          (ngModelChange)="inventory.updateName($event)"
          name="playerName"
          [disabled]="inventory.connected"
        />
      </label>

      <div class="actions">
        <button type="submit" [disabled]="!inventory.state.name.trim() || inventory.connected">
          Connect
        </button>
        <button
          type="button"
          class="ghost"
          (click)="inventory.disconnect()"
          [disabled]="!inventory.connected"
        >
          Disconnect
        </button>
      </div>
    </form>

    <div class="status">
      <span class="dot" [class.connected]="inventory.connected"></span>
      <span class="text">Status: {{ inventory.status }}</span>
    </div>

    <section class="host" *ngIf="inventory.connected">
      <h2>Host controls</h2>
      <p *ngIf="!inventory.state.isHost">Waiting for the host to start the game.</p>
      <div class="actions" *ngIf="inventory.state.isHost">
        <button type="button" (click)="inventory.startGame()" [disabled]="inventory.state.gameStarted">
          Start game
        </button>
      </div>
      <p class="game-started" *ngIf="inventory.state.gameStarted">Game started.</p>
    </section>

    <section class="players">
      <h2>Other connected players</h2>
      <p *ngIf="!inventory.connected">Connect to see who is online.</p>
      <ul *ngIf="inventory.connected">
        <li *ngFor="let player of inventory.otherPlayers">
          {{ player }}
        </li>
        <li *ngIf="inventory.otherPlayers.length === 0" class="empty">No one else yet.</li>
      </ul>
    </section>
  </section>
</main>
